<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام ERP الدوائي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sidebar:#161b22;--card:#1c2128;--border:#30363d;
  --green:#2ea043;--green-light:#3fb950;--green-bg:#0d2818;
  --text:#e6edf3;--muted:#8b949e;--hover:#21262d;
  --blue:#388bfd;--red:#f85149;--amber:#e3b341;--purple:#bc8cff;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}

/* SIDEBAR */
aside{width:240px;background:var(--sidebar);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;height:100vh;z-index:100;overflow-y:auto}
.logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2ea043,#1a7f37);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 0 20px rgba(46,160,67,.3)}
.logo-text .t1{font-weight:700;font-size:14px;line-height:1.2;color:var(--text)}
.logo-text .t2{font-size:11px;color:var(--green-light);font-weight:500}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:16px 10px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:13px;cursor:pointer;border-radius:8px;margin-bottom:2px;color:var(--muted);transition:all .15s;font-weight:500}
.nav-item:hover{background:var(--hover);color:var(--text)}
.nav-item.active{background:var(--green-bg);color:var(--green-light);border:1px solid rgba(46,160,67,.3)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:11px}

/* MAIN */
main{margin-right:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left h1{font-size:20px;font-weight:700;color:var(--text)}
.topbar-left p{font-size:12px;color:var(--muted);margin-top:2px}
.content{padding:24px 28px;flex:1}

/* CARDS & STATS */
.stats-grid{display:grid;gap:14px;margin-bottom:22px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;transition:border-color .2s}
.stat-card:hover{border-color:var(--green)}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.stat-card .val{font-size:24px;font-weight:700;line-height:1}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h2{font-size:15px;font-weight:600;color:var(--text)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
th{padding:11px 16px;text-align:right;font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--hover)}
.empty{padding:48px;text-align:center;color:var(--muted);font-size:13px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Cairo',sans-serif}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-light)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--hover);color:var(--text)}
.btn-danger{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}.btn-danger:hover{background:rgba(248,81,73,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.icon-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;display:inline-flex;align-items:center;transition:all .15s;color:var(--muted)}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.icon-btn.edit:hover{color:var(--blue)}
.icon-btn.del:hover{color:var(--red)}
.action-bar{display:flex;gap:8px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.b-green{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.25)}
.b-gray{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border)}
.b-amber{background:rgba(227,179,65,.15);color:var(--amber);border:1px solid rgba(227,179,65,.25)}
.b-blue{background:rgba(56,139,253,.15);color:var(--blue);border:1px solid rgba(56,139,253,.25)}
.b-red{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.25)}
.b-purple{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.25)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:none;font-family:'Cairo',sans-serif}
.tab.active{background:var(--green);color:#fff}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-head h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px;transition:all .15s}
.modal-close:hover{background:var(--hover);color:var(--text)}
.modal-body{padding:22px 24px}

/* FORMS */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);transition:border .15s;font-family:'Cairo',sans-serif}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(46,160,67,.15)}
.fg select option{background:var(--card)}
.fg textarea{resize:vertical;rows:3}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ALERTS */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;border:1px solid}
.alert-warn{background:rgba(227,179,65,.1);border-color:rgba(227,179,65,.3);color:var(--amber)}

/* PROGRESS */
.pbar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;flex:1}
.pfill{height:100%;border-radius:3px}

/* MISC */
code{font-family:monospace;font-size:12px;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:var(--green-light)}
strong{font-weight:700;color:var(--text)}
.text-green{color:var(--green-light)} .text-red{color:var(--red)} .text-blue{color:var(--blue)} .text-amber{color:var(--amber)} .text-purple{color:var(--purple)} .text-muted{color:var(--muted)}
.fw7{font-weight:700} .fz12{font-size:12px}

@media print{
  aside,.topbar .btn,.icon-btn,#modal-root{display:none!important}
  main{margin-right:0!important}
  body{background:#fff!important;color:#000!important}
  .card,.stat-card{border:1px solid #ccc!important;background:#fff!important}
  th,td{color:#000!important}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<aside id="sidebar">
  <div class="logo">
    <div class="logo-icon">ف</div>
    <div class="logo-text"><div class="t1">نظام إدارة</div><div class="t2">الشركة الدوائية</div></div>
  </div>
  <nav id="nav-menu"></nav>
  <div class="sidebar-footer">نظام ERP الدوائي v2.0</div>
</aside>

<main>
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="pg-title">لوحة التحكم</h1>
      <p id="pg-sub"></p>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
  <button class="btn btn-ghost" onclick="window.print()" style="gap:6px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    طباعة
  </button>
  <button class="btn btn-ghost" onclick="exportExcel()" style="gap:6px;color:var(--green-light);border-color:rgba(46,160,67,.4)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    تصدير Excel
  </button>
  <div id="pg-action"></div>
</div>
  </div>
  <div class="content" id="pg-content"></div>
</main>

<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════
// DATA LAYER — localStorage persistence
// ═══════════════════════════════════════════════
const STORE_KEY = 'pharma_erp_v2';

const defaultDB = {
  products:[], materials:[], materialReceipts:[], productBOM:[],
  cmos:[], productionOrders:[], inventory:[], goodsReceipts:[],
  registrations:[], distributors:[], deliveryOrders:[], deliveryItems:[],
  expenses:[], employees:[], budgetLines:[], campaigns:[], salesTargets:[],
  receivables:[], payrollRuns:[], purchaseOrders:[], qualityChecks:[],
  returns:[], contracts:[],
  _seq:{}
};

let DB = loadDB();

function loadDB(){
  try{ const d=localStorage.getItem(STORE_KEY); return d?JSON.parse(d):{...defaultDB}; }
  catch(e){ return {...defaultDB}; }
}
function saveDB(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(DB)); }catch(e){} }

function nextId(t){
  if(!DB._seq)DB._seq={};
  const cur=DB._seq[t]||(DB[t]?.reduce((m,r)=>Math.max(m,r.id||0),0)||0);
  DB._seq[t]=cur+1;
  return DB._seq[t];
}
function insert(t,obj){ const row={...obj,id:nextId(t),createdAt:new Date().toISOString()}; DB[t].push(row); saveDB(); return row; }
function update(t,id,patch){ const i=DB[t].findIndex(r=>r.id===id); if(i>=0){DB[t][i]={...DB[t][i],...patch};saveDB();return DB[t][i];} }
function remove(t,id){ DB[t]=DB[t].filter(r=>r.id!==id); saveDB(); }
function getAll(t){ return DB[t]||[]; }
function getById(t,id){ return (DB[t]||[]).find(r=>r.id===id); }

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fmt=(n)=>Number(n||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=(n)=>Number(n||0).toLocaleString('ar-EG');
const today=()=>new Date().toISOString().slice(0,10);

const BADGE_MAP={
  active:['b-green','نشط'], inactive:['b-gray','غير نشط'], pending:['b-amber','قيد الانتظار'],
  in_production:['b-blue','في الإنتاج'], received:['b-green','مستلم'], delivered:['b-green','مسلّم'],
  cancelled:['b-red','ملغي'], expired:['b-red','منتهي'], direct:['b-blue','مباشر'],
  indirect:['b-purple','غير مباشر'], raw_material:['b-blue','مادة خام'], packaging:['b-purple','تغليف']
};
const badge=(s)=>{ const [c,l]=BADGE_MAP[s]||['b-gray',s]; return `<span class="badge ${c}">${l}</span>`; };

const MONTHS=['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DEPTS=['التصنيع','التسجيل الدوائي','الحسابات','الدعاية والمبيعات','الإدارة'];
const CATS_D=['تكاليف تصنيع','مواد خام','تعبئة وتغليف','نقل المنتج','تخزين','جودة ورقابة'];
const CATS_I=['رواتب وأجور','دعاية وإعلان','تسجيل دوائي','إيجار','خدمات','مصاريف إدارية','صيانة','تأمين','قانونية ومحاسبة'];
const UNITS=['كجم','جم','مجم','لتر','مل','قطعة','علبة','كرتون','لفة','أمبولة'];
const FORMS=['شراب','أقراص','كبسولات','حقن','مرهم','قطرة','تحاميل','بودرة','أمبولات'];

const ic={
  plus:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  edit:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  del:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  check:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  warn:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

// DOM helpers
const $=id=>document.getElementById(id);
const val=id=>($(id)?.value||'').trim();
const numVal=id=>Number($(id)?.value||0);
const setHTML=(id,h)=>{ const el=$(id); if(el)el.innerHTML=h; };

function fg(lbl,inp){ return `<div class="fg"><label>${lbl}</label>${inp}</div>`; }
function inp(id,type='text',value='',ph=''){ return `<input type="${type}" id="${id}" value="${(value||'').toString().replace(/"/g,'&quot;')}" placeholder="${ph}">`; }
function sel(id,opts,val=''){ return `<select id="${id}">${opts.map(o=>{ const v=typeof o==='string'?o:o.v; const l=typeof o==='string'?o:o.l; return `<option value="${v}" ${v==val?'selected':''}>${l}</option>`; }).join('')}</select>`; }
function txa(id,val=''){ return `<textarea id="${id}" rows="3">${val||''}</textarea>`; }

function tbl(headers,rows){
  if(!rows.length) return `<div class="empty">📭 لا توجد بيانات بعد</div>`;
  return `<div class="tbl-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}
function tr(...cells){ return `<tr>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`; }

function modal(title,body){
  return `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
    <div class="modal">
      <div class="modal-head"><h2>${title}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}
function showModal(html){ $('modal-root').innerHTML=html; }
function closeModal(){ $('modal-root').innerHTML=''; }

function setPage(title,sub,action,content){
  setHTML('pg-title',title);
  setHTML('pg-sub',sub||'');
  setHTML('pg-action',action||'');
  setHTML('pg-content',content);
}

// Tabs helper
function initTabs(){
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.onclick=function(){
      const group=this.dataset.group;
      document.querySelectorAll(`.tab[data-group="${group}"]`).forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll(`.tab-pane[data-group="${group}"]`).forEach(p=>p.style.display='none');
      const target=$(this.dataset.tab);
      if(target)target.style.display='';
    };
  });
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
let currentPage='dashboard';

const navItems=[
  {id:'dashboard',icon:'📊',label:'لوحة التحكم',section:'الرئيسية'},
  {id:'products',icon:'💊',label:'المنتجات',section:'الإنتاج'},
  {id:'materials',icon:'🧪',label:'المواد الخام والتغليف',section:'الإنتاج'},
  {id:'cmos',icon:'🏭',label:'المصانع (CMO)',section:'الإنتاج'},
  {id:'production',icon:'📋',label:'أوامر الإنتاج',section:'الإنتاج'},
  {id:'inventory',icon:'🏪',label:'المخزون',section:'المخزون والمبيعات'},
  {id:'registration',icon:'📑',label:'التسجيل الدوائي',section:'المخزون والمبيعات'},
  {id:'distributors',icon:'🏢',label:'الموزعون',section:'المخزون والمبيعات'},
  {id:'deliveries',icon:'🚚',label:'التوريد والمبيعات',section:'المخزون والمبيعات'},
  {id:'expenses',icon:'🧾',label:'المصروفات',section:'المالية'},
  {id:'employees',icon:'👥',label:'الموظفون',section:'المالية'},
  {id:'budget',icon:'💰',label:'الميزانية',section:'المالية'},
  {id:'marketing',icon:'📢',label:'الدعاية والمبيعات',section:'المالية'},
  {id:'reports',icon:'📈',label:'التقارير المالية',section:'المالية'},
  {id:'receivables',icon:'💳',label:'الحسابات والذمم',section:'المالية'},
  {id:'payroll',icon:'💼',label:'مسير الرواتب',section:'المالية'},
  {id:'purchasing',icon:'📦',label:'إدارة المشتريات',section:'العمليات'},
  {id:'quality',icon:'🔬',label:'ضبط الجودة QC',section:'العمليات'},
  {id:'expiry',icon:'📅',label:'صلاحية المنتجات',section:'العمليات'},
  {id:'returns',icon:'🔄',label:'المرتجعات',section:'العمليات'},
  {id:'contracts',icon:'📝',label:'العقود والاتفاقيات',section:'العمليات'},
  {id:'salesvstarget',icon:'📊',label:'المبيعات vs الأهداف',section:'العمليات'},
  {id:'costanalysis',icon:'📉',label:'تحليل تكلفة المنتج',section:'العمليات'},
];

function renderNav(){
  let html=''; let lastSection='';
  navItems.forEach(n=>{
    if(n.section!==lastSection){ html+=`<div class="nav-section">${n.section}</div>`; lastSection=n.section; }
    html+=`<div class="nav-item ${currentPage===n.id?'active':''}" onclick="go('${n.id}')"><span class="icon">${n.icon}</span><span>${n.label}</span></div>`;
  });
  setHTML('nav-menu',html);
}

function go(page){
  currentPage=page;
  renderNav();
  closeModal();
  (PAGES[page]||PAGES.dashboard)();
}

// ═══════════════════════════════════════════════
// PAGES
// ═══════════════════════════════════════════════
const PAGES={

dashboard(){
  const pr=getAll('products'), inv=getAll('inventory'), ex=getAll('expenses');
  const del=getAll('deliveryOrders'), po=getAll('productionOrders');
  const rev=del.filter(d=>d.status==='delivered').reduce((s,d)=>s+Number(d.totalAmount||0),0);
  const dc=ex.filter(e=>e.expenseType==='direct').reduce((s,e)=>s+Number(e.amount||0),0);
  const ic2=ex.filter(e=>e.expenseType==='indirect').reduce((s,e)=>s+Number(e.amount||0),0);
  const pc=po.reduce((s,p)=>s+Number(p.totalCost||0),0);
  const tc=dc+ic2+pc, np=rev-tc;
  const iv=inv.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitCost||0),0);
  const margin=rev>0?((np/rev)*100).toFixed(1):0;

  const recentPO=po.slice(-5).reverse();
  const recentDel=del.slice(-5).reverse();

  setPage('لوحة التحكم الرئيسية','نظرة شاملة على أداء الشركة','',`
    <div class="stats-grid g4">
      <div class="stat-card"><div class="lbl">إجمالي الإيرادات</div><div class="val text-green">${fmt(rev)}</div><div class="sub">ج.م — من التوريد المسلّم</div></div>
      <div class="stat-card"><div class="lbl">صافي الربح / الخسارة</div><div class="val ${np>=0?'text-green':'text-red'}">${fmt(np)}</div><div class="sub">هامش الربح: ${margin}%</div></div>
      <div class="stat-card"><div class="lbl">إجمالي التكاليف</div><div class="val text-red">${fmt(tc)}</div><div class="sub">ج.م — مباشرة + إنتاج + غير مباشرة</div></div>
      <div class="stat-card"><div class="lbl">قيمة المخزون</div><div class="val text-blue">${fmt(iv)}</div><div class="sub">ج.م — ${inv.length} صنف</div></div>
    </div>
    <div class="stats-grid g4" style="margin-top:-8px">
      <div class="stat-card"><div class="lbl">تكاليف مباشرة</div><div class="val text-blue" style="font-size:18px">${fmt(dc)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">تكاليف إنتاج</div><div class="val text-amber" style="font-size:18px">${fmt(pc)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">تكاليف غير مباشرة</div><div class="val text-purple" style="font-size:18px">${fmt(ic2)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">المنتجات المسجلة</div><div class="val" style="font-size:18px">${pr.length}</div><div class="sub">منتج</div></div>
    </div>
    <div class="stats-grid g2">
      <div class="card">
        <div class="card-head"><h2>آخر أوامر الإنتاج</h2></div>
        ${recentPO.length?`<div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>المصنع</th><th>الكمية</th><th>الحالة</th></tr></thead><tbody>
        ${recentPO.map(o=>tr(
          getAll('products').find(p=>p.id===o.productId)?.name||'-',
          getAll('cmos').find(c=>c.id===o.cmoId)?.name||'-',
          fmtN(o.quantity),
          badge(o.status||'pending')
        )).join('')}</tbody></table></div>`:'<div class="empty">لا توجد أوامر</div>'}
      </div>
      <div class="card">
        <div class="card-head"><h2>آخر أوامر التوريد</h2></div>
        ${recentDel.length?`<div class="tbl-wrap"><table><thead><tr><th>الموزع</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody>
        ${recentDel.map(o=>tr(
          getAll('distributors').find(d=>d.id===o.distributorId)?.name||'-',
          `<span class="text-green fw7">${fmt(o.totalAmount)} ج.م</span>`,
          badge(o.status||'pending')
        )).join('')}</tbody></table></div>`:'<div class="empty">لا توجد أوامر</div>'}
      </div>
    </div>
  `);
},

products(){
  const rows=getAll('products');
  setPage('إدارة المنتجات',`${rows.length} منتج مسجل`,
    `<button class="btn btn-green" onclick="addProduct()">${ic.plus} إضافة منتج</button>`,
    `<div class="card">${tbl(['اسم المنتج','الاسم العلمي','الشكل','التركيز','الوحدة','سعر البيع','الحالة',''],
      rows.map(p=>tr(
        `<strong>${p.name}</strong>`,p.scientificName||'-',p.dosageForm,p.strength||'-',p.unit||'-',
        p.sellingPrice?`<span class="text-green fw7">${fmt(p.sellingPrice)} ج.م</span>`:'-',
        badge(p.status||'active'),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editProduct(${p.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('products',${p.id});go('products')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

materials(){
  const mats=getAll('materials'), rcpts=getAll('materialReceipts');
  const raw=mats.filter(m=>m.materialType==='raw_material');
  const pkg=mats.filter(m=>m.materialType==='packaging');
  const expW=rcpts.filter(r=>r.expiryDate&&(new Date(r.expiryDate)-new Date())/86400000<90).length;
  const low=mats.filter(m=>m.reorderLevel&&Number(m.currentStock||0)<=Number(m.reorderLevel)).length;
  const matRow=m=>{
    const isLow=m.reorderLevel&&Number(m.currentStock||0)<=Number(m.reorderLevel);
    return tr(
      `${isLow?'⚠️ ':''}<strong>${m.name}</strong>`, m.unit,
      `<span class="${isLow?'text-amber fw7':''}">${fmt(m.currentStock||0)} ${m.unit}</span>`,
      m.reorderLevel?`${fmt(m.reorderLevel)} ${m.unit}`:'-',
      m.unitCost?`${fmt(m.unitCost)} ج.م`:'-', m.supplier||'-', badge(m.status||'active'),
      `<div class="action-bar"><button class="icon-btn edit" onclick="editMaterial(${m.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('materials',${m.id});go('materials')}">${ic.del}</button></div>`
    );
  };
  setPage('المواد الخام والتغليف',`${raw.length} خام · ${pkg.length} تغليف`,
    `<div class="action-bar"><button class="btn btn-green" onclick="addMaterial('raw_material')">${ic.plus} مادة خام</button><button class="btn btn-ghost" onclick="addMaterial('packaging')">${ic.plus} مادة تغليف</button><button class="btn btn-ghost" onclick="addMaterialReceipt()">📥 استلام مواد</button></div>`,
    `<div class="stats-grid g4">
      <div class="stat-card"><div class="lbl">مواد خام</div><div class="val text-blue">${raw.length}</div></div>
      <div class="stat-card"><div class="lbl">مواد تغليف</div><div class="val text-purple">${pkg.length}</div></div>
      <div class="stat-card"><div class="lbl">دفعات قاربت الانتهاء</div><div class="val ${expW?'text-red':'text-green'}">${expW}</div></div>
      <div class="stat-card"><div class="lbl">مواد تحت حد الطلب</div><div class="val ${low?'text-amber':'text-green'}">${low}</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-group="mat" data-tab="mat-raw">المواد الخام</button>
      <button class="tab" data-group="mat" data-tab="mat-pkg">مواد التغليف</button>
      <button class="tab" data-group="mat" data-tab="mat-rcpt">الدفعات المستلمة</button>
    </div>
    <div id="mat-raw" class="tab-pane" data-group="mat"><div class="card">${tbl(['الاسم','الوحدة','المخزون','حد الطلب','سعر الوحدة','المورد','الحالة',''],raw.map(matRow))}</div></div>
    <div id="mat-pkg" class="tab-pane" data-group="mat" style="display:none"><div class="card">${tbl(['الاسم','الوحدة','المخزون','حد الطلب','سعر الوحدة','المورد','الحالة',''],pkg.map(matRow))}</div></div>
    <div id="mat-rcpt" class="tab-pane" data-group="mat" style="display:none"><div class="card">${tbl(['المادة','النوع','الكمية','رقم الدفعة','تاريخ الصلاحية','تاريخ الاستلام','تكلفة الوحدة','المورد'],
      rcpts.map(r=>{ const mat=getById('materials',r.materialId); return tr(mat?.name||'-',badge(mat?.materialType||'raw_material'),`${fmt(r.quantityReceived)} ${mat?.unit||''}`,r.batchNumber||'-',r.expiryDate||'-',r.receiptDate||'-',r.unitCost?fmt(r.unitCost)+' ج.م':'-',r.supplier||'-'); })
    )}</div></div>
    `);
  initTabs();
},

cmos(){
  const rows=getAll('cmos');
  setPage('إدارة المصانع (CMO)',`${rows.length} مصنع`,
    `<button class="btn btn-green" onclick="addCmo()">${ic.plus} إضافة مصنع</button>`,
    `<div class="card">${tbl(['اسم المصنع','المسؤول','الهاتف','البريد','رقم الترخيص','الحالة',''],
      rows.map(c=>tr(`<strong>${c.name}</strong>`,c.contactPerson||'-',c.phone||'-',c.email||'-',c.licenseNumber?`<code>${c.licenseNumber}</code>`:'-',badge(c.status||'active'),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editCmo(${c.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('cmos',${c.id});go('cmos')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

    `<div class="card">${tbl(['رقم الأمر','المنتج','المصنع','الكمية','تكلفة الوحدة','إجمالي التكلفة','تاريخ الأمر','الموعد المتوقع','الحالة',''],
      rows.map(o=>tr(
        `<code>${o.orderNumber||'PO-'+o.id}</code>`,
        getAll('products').find(p=>p.id===o.productId)?.name||'-',

        fmtN(o.quantity),
        o.unitCost?fmt(o.unitCost)+' ج.م':'-',
        o.totalCost?`<span class="text-red fw7">${fmt(o.totalCost)} ج.م</span>`:'-',
        o.orderDate||'-', o.expectedDate||'-', badge(o.status||'pending'),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editProduction(${o.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('productionOrders',${o.id});go('production')}">${ic.del}</button></div>`
      ))
    )}</div>`);

inventory(){
  const inv=getAll('inventory'), rcpts=getAll('goodsReceipts');
  const tv=inv.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitCost||0),0);
  setPage('المخزون واستلام البضاعة',`إجمالي قيمة المخزون: ${fmt(tv)} ج.م`,
    `<button class="btn btn-green" onclick="addGoodsReceipt()">${ic.plus} تسجيل استلام</button>`,
    `<div class="tabs"><button class="tab active" data-group="inv" data-tab="inv-stock">المخزون الحالي</button><button class="tab" data-group="inv" data-tab="inv-rcpt">سجل الاستلام</button></div>
    <div id="inv-stock" class="tab-pane" data-group="inv"><div class="card">${tbl(['المنتج','رقم التشغيلة','الكمية','تكلفة الوحدة','إجمالي القيمة','تاريخ الانتهاء'],
      inv.map(i=>tr(
        getAll('products').find(p=>p.id===i.productId)?.name||'-',
        i.batchNumber||'-',
        `<span class="${Number(i.quantity)<100?'text-red fw7':''}">${fmtN(i.quantity)}</span>`,
        i.unitCost?fmt(i.unitCost)+' ج.م':'-',
        `<span class="text-blue fw7">${fmt(Number(i.quantity||0)*Number(i.unitCost||0))} ج.م</span>`,
        i.expiryDate||'-'
      ))
    )}</div></div>
    <div id="inv-rcpt" class="tab-pane" data-group="inv" style="display:none"><div class="card">${tbl(['المنتج','الكمية المستلمة','رقم التشغيلة','تاريخ الاستلام','تكلفة الوحدة','تاريخ الانتهاء'],
      rcpts.map(r=>tr(
        getAll('products').find(p=>p.id===r.productId)?.name||'-',
        `<span class="text-green fw7">${fmtN(r.quantityReceived)}</span>`,
        r.batchNumber||'-', r.receiptDate||'-',
        r.unitCost?fmt(r.unitCost)+' ج.م':'-', r.expiryDate||'-'
      ))
    )}</div></div>`);
  initTabs();
},

registration(){
  const rows=getAll('registrations');
  const now=new Date();
  const expiring=rows.filter(r=>r.expiryDate&&(new Date(r.expiryDate)-now)/86400000<=90&&new Date(r.expiryDate)>now);
  const isExp=r=>r.expiryDate&&new Date(r.expiryDate)<now;
  setPage('التسجيل الدوائي','تراخيص هيئة الدواء المصرية',
    `<button class="btn btn-green" onclick="addRegistration()">${ic.plus} تسجيل جديد</button>`,
    `${expiring.length?`<div class="alert alert-warn">${ic.warn}<div><strong>تراخيص تنتهي خلال 90 يوم:</strong> ${expiring.map(r=>getById('products',r.productId)?.name||'').join(' • ')}</div></div>`:''}
    <div class="card">${tbl(['المنتج','رقم التسجيل','تاريخ الإصدار','تاريخ الانتهاء','رسوم التسجيل','رسوم التجديد','الحالة',''],
      rows.map(r=>tr(
        getAll('products').find(p=>p.id===r.productId)?.name||'-',
        r.registrationNumber?`<code>${r.registrationNumber}</code>`:'-',
        r.issueDate||'-',
        `<span class="${isExp(r)?'text-red fw7':''}">${r.expiryDate||'-'}</span>`,
        r.registrationFee?fmt(r.registrationFee)+' ج.م':'-',
        r.renewalFee?fmt(r.renewalFee)+' ج.م':'-',
        badge(isExp(r)?'expired':(r.status||'active')),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editRegistration(${r.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('registrations',${r.id});go('registration')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

distributors(){
  const rows=getAll('distributors');
  setPage('شركات التوزيع',`${rows.length} موزع`,
    `<button class="btn btn-green" onclick="addDistributor()">${ic.plus} إضافة موزع</button>`,
    `<div class="card">${tbl(['اسم الشركة','المسؤول','الهاتف','البريد','حد الائتمان','الحالة',''],
      rows.map(d=>tr(`<strong>${d.name}</strong>`,d.contactPerson||'-',d.phone||'-',d.email||'-',
        d.creditLimit?`<span class="text-blue fw7">${fmt(d.creditLimit)} ج.م</span>`:'-',
        badge(d.status||'active'),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editDistributor(${d.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('distributors',${d.id});go('distributors')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

deliveries(){
  const rows=getAll('deliveryOrders');
  const rev=rows.filter(o=>o.status==='delivered').reduce((s,o)=>s+Number(o.totalAmount||0),0);
  setPage('التوريد والمبيعات',`إجمالي المبيعات المسلّمة: ${fmt(rev)} ج.م`,
    `<button class="btn btn-green" onclick="addDelivery()">${ic.plus} أمر توريد جديد</button>`,
    `<div class="card">${tbl(['رقم الأمر','الموزع','التاريخ','إجمالي المبلغ','الحالة',''],
      rows.map(o=>tr(
        `<code>${o.orderNumber||'DO-'+o.id}</code>`,
        getAll('distributors').find(d=>d.id===o.distributorId)?.name||'-',
        o.orderDate||'-',
        o.totalAmount?`<span class="text-green fw7">${fmt(o.totalAmount)} ج.م</span>`:'-',
        badge(o.status||'pending'),
        `<div class="action-bar">${o.status==='pending'?`<button class="icon-btn" style="color:var(--green)" onclick="if(confirm('تأكيد التسليم؟')){update('deliveryOrders',${o.id},{status:'delivered'});go('deliveries')}" title="تأكيد التسليم">${ic.check}</button>`:''}<button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('deliveryOrders',${o.id});go('deliveries')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

expenses(){
  const rows=getAll('expenses');
  const dc=rows.filter(e=>e.expenseType==='direct').reduce((s,e)=>s+Number(e.amount||0),0);
  const ic2=rows.filter(e=>e.expenseType==='indirect').reduce((s,e)=>s+Number(e.amount||0),0);
  window._exAll=rows;
  setPage('إدارة المصروفات','التكاليف المباشرة وغير المباشرة',
    `<button class="btn btn-green" onclick="addExpense()">${ic.plus} إضافة مصروف</button>`,
    `<div class="stats-grid g3">
      <div class="stat-card"><div class="lbl">تكاليف مباشرة</div><div class="val text-blue">${fmt(dc)} ج.م</div><div class="sub">${rows.filter(e=>e.expenseType==='direct').length} بند</div></div>
      <div class="stat-card"><div class="lbl">تكاليف غير مباشرة</div><div class="val text-purple">${fmt(ic2)} ج.م</div><div class="sub">${rows.filter(e=>e.expenseType==='indirect').length} بند</div></div>
      <div class="stat-card"><div class="lbl">إجمالي المصروفات</div><div class="val text-red">${fmt(dc+ic2)} ج.م</div><div class="sub">${rows.length} بند</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-group="ex" data-tab="ex-all" onclick="renderExpTbl('all')">الكل</button>
      <button class="tab" data-group="ex" data-tab="ex-all" onclick="renderExpTbl('direct')">مباشرة</button>
      <button class="tab" data-group="ex" data-tab="ex-all" onclick="renderExpTbl('indirect')">غير مباشرة</button>
    </div>
    <div id="ex-all" class="card"></div>`);
  renderExpTbl('all');
},

employees(){
  const rows=getAll('employees');
  const active=rows.filter(e=>e.status==='active');

    `<div class="stats-grid g3">
      <div class="stat-card"><div class="lbl">إجمالي الموظفين</div><div class="val">${rows.length}</div><div class="sub">${active.length} نشط</div></div>
      <div class="stat-card"><div class="lbl">الرواتب الشهرية</div><div class="val text-red">${fmt(ts)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">الرواتب السنوية</div><div class="val text-purple">${fmt(ts*12)} ج.م</div></div>
    </div>
    <div class="card">${tbl(['الاسم','القسم','المنصب','الراتب','تاريخ التعيين','الهاتف','الحالة',''],
      rows.map(e=>tr(`<strong>${e.name}</strong>`,e.department,e.position,
        e.salary?`<span class="fw7">${fmt(e.salary)} ج.م</span>`:'-',
        e.hireDate||'-', e.phone||'-', badge(e.status||'active'),
        `<div class="action-bar"><button class="icon-btn edit" onclick="editEmployee(${e.id})">${ic.edit}</button><button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('employees',${e.id});go('employees')}">${ic.del}</button></div>`
      ))
    )}</div>`);
},

budget(){
  const lines=getAll('budgetLines');
  const exps=getAll('expenses');
  const tb=lines.reduce((s,l)=>s+Number(l.budgetedAmount||0),0);
  const catMap=new Map(); exps.forEach(e=>catMap.set(e.category,(catMap.get(e.category)||0)+Number(e.amount||0)));
  const ta=[...catMap.values()].reduce((s,v)=>s+v,0);
  setPage('إدارة الميزانية','المخطط مقابل الفعلي',
    `<button class="btn btn-green" onclick="addBudget()">${ic.plus} إضافة بند</button>`,
    `<div class="stats-grid g3">
      <div class="stat-card"><div class="lbl">إجمالي الميزانية</div><div class="val text-blue">${fmt(tb)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">الإنفاق الفعلي</div><div class="val text-red">${fmt(ta)} ج.م</div></div>
      <div class="stat-card"><div class="lbl">الفرق</div><div class="val ${tb>=ta?'text-green':'text-red'}">${fmt(tb-ta)} ج.م</div><div class="sub">${tb>=ta?'في الحدود':'⚠ تجاوز الميزانية'}</div></div>
    </div>
    <div class="tabs"><button class="tab active" data-group="bud" data-tab="bud-lines">بنود الميزانية</button><button class="tab" data-group="bud" data-tab="bud-cmp">المقارنة</button></div>
    <div id="bud-lines" class="tab-pane" data-group="bud"><div class="card">${tbl(['السنة','الشهر','القسم','الفئة','الوصف','المبلغ المخطط',''],
      lines.map(l=>tr(l.year,l.month?MONTHS[l.month-1]:'سنوي',l.department||'-',l.category,l.description||'-',
        `<span class="text-blue fw7">${fmt(l.budgetedAmount)} ج.م</span>`,
        `<button class="icon-btn del" onclick="if(confirm('حذف؟')){remove('budgetLines',${l.id});go('budget')}">${ic.del}</button>`
      ))
    )}</div></div>
    <div id="bud-cmp" class="tab-pane" data-group="bud" style="display:none"><div class="card">${tbl(['الفئة','المخطط','الفعلي','الفرق','نسبة الاستهلاك'],
      lines.map(l=>{ const act=catMap.get(l.category)||0, diff=Number(l.budgetedAmount)-act, pct=Number(l.budgetedAmount)>0?(act/Number(l.budgetedAmount)*100):0, col=pct>100?'var(--red)':pct>80?'var(--amber)':'var(--green-light)';

reports(){
  const exps=getAll('expenses'), dels=getAll('deliveryOrders'), pos=getAll('productionOrders'), inv=getAll('inventory'), bud=getAll('budgetLines');
  const rev=dels.filter(d=>d.status==='delivered').reduce((s,d)=>s+Number(d.totalAmount||0),0);
  const dc=exps.filter(e=>e.expenseType==='direct').reduce((s,e)=>s+Number(e.amount||0),0);
  const ic2=exps.filter(e=>e.expenseType==='indirect').reduce((s,e)=>s+Number(e.amount||0),0);
  const pc=pos.reduce((s,p)=>s+Number(p.totalCost||0),0);
  const tc=dc+ic2+pc, np=rev-tc, gp=rev-pc-dc;
  const iv=inv.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitCost||0),0);
  const catMap=new Map(); exps.forEach(e=>catMap.set(e.category,(catMap.get(e.category)||0)+Number(e.amount||0)));
  const dcats=exps.filter(e=>e.expenseType==='direct').reduce((m,e)=>{m.set(e.category,(m.get(e.category)||0)+Number(e.amount||0));return m;},new Map());
  const icats=exps.filter(e=>e.expenseType==='indirect').reduce((m,e)=>{m.set(e.category,(m.get(e.category)||0)+Number(e.amount||0));return m;},new Map());

  setPage('التقارير المالية','قائمة الدخل • المركز المالي • التحليل الشامل','',`
    <div class="tabs">
      <button class="tab active" data-group="rpt" data-tab="rpt-pl">قائمة الدخل</button>
      <button class="tab" data-group="rpt" data-tab="rpt-bal">المركز المالي</button>
      <button class="tab" data-group="rpt" data-tab="rpt-bud">الميزانية مقابل الفعلي</button>
      <button class="tab" data-group="rpt" data-tab="rpt-inv">قيمة المخزون</button>
    </div>

    <div id="rpt-pl" class="tab-pane" data-group="rpt">
      <div class="card" style="padding:28px;max-width:700px">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)">📄 قائمة الدخل</h2>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed var(--border)"><span style="font-weight:600">الإيرادات</span><span class="text-green fw7" style="font-size:18px">${fmt(rev)} ج.م</span></div>
        <div style="padding:10px 0 4px;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase">التكاليف المباشرة:</div>
        <div style="display:flex;justify-content:space-between;padding:6px 16px"><span>تكاليف الإنتاج (CMO)</span><span class="text-red">- ${fmt(pc)} ج.م</span></div>
        ${[...dcats].map(([cat,amt])=>`<div style="display:flex;justify-content:space-between;padding:4px 28px;font-size:12px;color:var(--muted)"><span>• ${cat}</span><span>- ${fmt(amt)} ج.م</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);font-weight:700;margin-top:6px"><span>مجمل الربح</span><span class="${gp>=0?'text-green':'text-red'}" style="font-size:17px">${fmt(gp)} ج.م</span></div>
        <div style="padding:10px 0 4px;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase">المصروفات غير المباشرة:</div>
        ${[...icats].map(([cat,amt])=>`<div style="display:flex;justify-content:space-between;padding:6px 16px"><span>• ${cat}</span><span class="text-red">- ${fmt(amt)} ج.م</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:6px 16px;border-top:1px dashed var(--border);margin-top:4px;font-weight:600"><span>إجمالي غير المباشرة</span><span class="text-red">- ${fmt(ic2)} ج.م</span></div>
        <div style="display:flex;justify-content:space-between;padding:16px 0;border-top:2px solid ${np>=0?'var(--green)':'var(--red)'};margin-top:10px">
          <span style="font-weight:700;font-size:17px">${np>=0?'✅ صافي الربح':'❌ صافي الخسارة'}</span>
          <span class="${np>=0?'text-green':'text-red'} fw7" style="font-size:22px">${fmt(np)} ج.م</span>
        </div>
        <div class="text-muted fz12">هامش الربح الصافي: ${rev>0?((np/rev)*100).toFixed(2):0}%</div>
      </div>
    </div>

    <div id="rpt-bal" class="tab-pane" data-group="rpt" style="display:none">
      <div class="card" style="padding:28px">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)">🏦 المركز المالي</h2>
        <div class="stats-grid g2">
          <div>
            <h3 style="color:var(--blue);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(56,139,253,.2)">الأصول</h3>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>قيمة المخزون</span><span class="text-blue fw7">${fmt(iv)} ج.م</span></div>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>الذمم المدينة</span><span class="text-blue fw7">${fmt(rev)} ج.م</span></div>
            <div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--blue);font-weight:700"><span>إجمالي الأصول</span><span class="text-blue" style="font-size:18px">${fmt(iv+rev)} ج.م</span></div>
          </div>
          <div>
            <h3 style="color:var(--red);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(248,81,73,.2)">الالتزامات وحقوق الملكية</h3>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>إجمالي المصروفات</span><span class="text-red fw7">${fmt(tc)} ج.م</span></div>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>صافي حقوق الملكية</span><span class="${np>=0?'text-green':'text-red'} fw7">${fmt(np)} ج.م</span></div>
            <div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--red);font-weight:700"><span>إجمالي الالتزامات</span><span class="text-red" style="font-size:18px">${fmt(tc+np)} ج.م</span></div>
          </div>
        </div>
      </div>
    </div>

    <div id="rpt-bud" class="tab-pane" data-group="rpt" style="display:none">
      <div class="card">${tbl(['الفئة','القسم','المخطط','الفعلي','الفرق','النسبة'],
        bud.map(b=>{ const act=catMap.get(b.category)||0, diff=Number(b.budgetedAmount)-act, pct=Number(b.budgetedAmount)>0?(act/Number(b.budgetedAmount)*100):0, col=pct>100?'var(--red)':pct>80?'var(--amber)':'var(--green-light)';
          return tr(`<strong>${b.category}</strong>`,b.department||'عام',
            `<span class="text-blue">${fmt(b.budgetedAmount)} ج.م</span>`,
            `<span class="text-red">${fmt(act)} ج.م</span>`,
            `<span class="${diff>=0?'text-green':'text-red'} fw7">${fmt(diff)} ج.م</span>`,
            `<div style="display:flex;align-items:center;gap:8px"><div class="pbar"><div class="pfill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div><span style="color:${col};font-weight:700;font-size:12px;min-width:36px">${pct.toFixed(0)}%</span></div>`
          );
        })
      )}</div>
    </div>

    <div id="rpt-inv" class="tab-pane" data-group="rpt" style="display:none">
      <div class="stats-grid g2" style="margin-bottom:16px">
        <div class="stat-card"><div class="lbl">إجمالي قيمة المخزون</div><div class="val text-blue">${fmt(iv)} ج.م</div></div>
        <div class="stat-card"><div class="lbl">عدد الأصناف</div><div class="val">${inv.length}</div></div>
      </div>
      <div class="card">${tbl(['المنتج','الكمية','تكلفة الوحدة','القيمة الإجمالية'],
        inv.map(i=>tr(
          getAll('products').find(p=>p.id===i.productId)?.name||'-',
          fmtN(i.quantity), i.unitCost?fmt(i.unitCost)+' ج.م':'-',
          `<span class="text-blue fw7">${fmt(Number(i.quantity||0)*Number(i.unitCost||0))} ج.م</span>`
        ))
      )}</div>
    </div>
  `);
  initTabs();
},

function saveMaterialReceipt(){
  const matId=numVal('mr-mat'), qty=val('mr-qty');

  insert('materialReceipts',{materialId:matId,quantityReceived:qty,batchNumber:val('mr-batch')||null,expiryDate:val('mr-exp')||null,receiptDate:val('mr-date')||null,unitCost:val('mr-cost')||null,supplier:val('mr-sup')||null,invoiceNumber:val('mr-inv')||null});

window._dvItems=[{productId:0,quantity:1,unitPrice:''}];
function addDelivery(){
  const dOpts=[{v:0,l:'اختر موزع...'},...getAll('distributors').map(d=>({v:d.id,l:d.name}))];
  window._dvItems=[{productId:0,quantity:1,unitPrice:''}];
  showModal(modal('أمر توريد جديد',`
    <div class="form-row">${fg('الموزع *',sel('dv-dist',dOpts))}${fg('رقم الأمر',inp('dv-num'))}</div>
    ${fg('تاريخ الأمر',inp('dv-date','date',today()))}
    <div class="fg"><label>بنود الأمر</label><div id="dv-items-wrap" style="border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg)"></div>
    <button type="button" onclick="addDvItem()" style="margin-top:8px;font-size:12px;color:var(--green-light);background:none;border:none;cursor:pointer;font-weight:700">+ إضافة بند</button></div>
    <div id="dv-total" style="font-size:15px;font-weight:700;color:var(--green-light);margin-top:4px">الإجمالي: 0.00 ج.م</div>
    <div class="form-actions"><button class="btn btn-green" onclick="saveDelivery()">💾 حفظ</button><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>
  `));
  renderDvItems();
}
function renderDvItems(){
  const prods=getAll('products');
  const wrap=$('dv-items-wrap'); if(!wrap)return;
  wrap.innerHTML=window._dvItems.map((item,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <select onchange="window._dvItems[${i}].productId=Number(this.value)" style="flex:2;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;color:var(--text);font-family:inherit">
        <option value="0">اختر منتج...</option>
        ${prods.map(p=>`<option value="${p.id}" ${p.id===item.productId?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <input type="number" value="${item.quantity}" placeholder="الكمية" onchange="window._dvItems[${i}].quantity=Number(this.value);updateDvTotal()" style="width:70px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;color:var(--text);font-family:inherit">
      <input type="number" value="${item.unitPrice}" placeholder="السعر" onchange="window._dvItems[${i}].unitPrice=this.value;updateDvTotal()" style="width:90px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;color:var(--text);font-family:inherit">
      ${window._dvItems.length>1?`<button onclick="window._dvItems.splice(${i},1);renderDvItems()" style="color:var(--red);background:none;border:none;cursor:pointer;font-size:18px;padding:0 4px">×</button>`:''}
    </div>`).join('');
  updateDvTotal();
}
function addDvItem(){ window._dvItems.push({productId:0,quantity:1,unitPrice:''}); renderDvItems(); }
function updateDvTotal(){
  const t=(window._dvItems||[]).reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitPrice||0),0);
  const el=$('dv-total'); if(el) el.textContent=`الإجمالي: ${fmt(t)} ج.م`;
}
function saveDelivery(){
  const distId=numVal('dv-dist'); if(!distId) return alert('يرجى اختيار الموزع');
  const items=window._dvItems||[];
  const total=items.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitPrice||0),0);
  const order=insert('deliveryOrders',{distributorId:distId,orderNumber:val('dv-num')||null,orderDate:val('dv-date')||null,status:'pending',totalAmount:String(total)});
  items.forEach(item=>{ if(item.productId) insert('deliveryItems',{deliveryOrderId:order.id,productId:item.productId,quantity:item.quantity,unitPrice:item.unitPrice,totalPrice:String(Number(item.quantity||0)*Number(item.unitPrice||0))}); });
  closeModal(); go('deliveries');
}

    ['المواد الخام',getAll('materials').map(m=>({'اسم المادة':m.name,'النوع':m.materialType==='raw_material'?'خام':'تغليف','الوحدة':m.unit,'المخزون':Number(m.currentStock||0),'سعر الوحدة':Number(m.unitCost||0),'المورد':m.supplier||''}))],
    ['أوامر الإنتاج',getAll('productionOrders').map(o=>({'رقم الأمر':o.orderNumber||'PO-'+o.id,'المنتج':getAll('products').find(p=>p.id===o.productId)?.name||'','المصنع':getAll('cmos').find(c=>c.id===o.cmoId)?.name||'','الكمية':Number(o.quantity||0),'الإجمالي':Number(o.totalCost||0),'الحالة':o.status||''}))],
    ['المخزون',getAll('inventory').map(i=>({'المنتج':getAll('products').find(p=>p.id===i.productId)?.name||'','الكمية':Number(i.quantity||0),'تكلفة الوحدة':Number(i.unitCost||0),'القيمة الإجمالية':Number(i.quantity||0)*Number(i.unitCost||0),'تاريخ الانتهاء':i.expiryDate||''}))],
    ['الموزعون',getAll('distributors').map(d=>({'اسم الشركة':d.name,'المسؤول':d.contactPerson||'','الهاتف':d.phone||'','حد الائتمان':Number(d.creditLimit||0),'الحالة':d.status||''}))],
    ['المبيعات',getAll('deliveryOrders').map(o=>({'رقم الأمر':o.orderNumber||'DO-'+o.id,'الموزع':getAll('distributors').find(d=>d.id===o.distributorId)?.name||'','التاريخ':o.orderDate||'','المبلغ':Number(o.totalAmount||0),'الحالة':o.status||''}))],
    ['المصروفات',getAll('expenses').map(e=>({'الوصف':e.description,'المبلغ':Number(e.amount||0),'النوع':e.expenseType==='direct'?'مباشر':'غير مباشر','الفئة':e.category,'القسم':e.department||'','التاريخ':e.expenseDate||''}))],
    ['الموظفون',getAll('employees').map(e=>({'الاسم':e.name,'القسم':e.department,'المنصب':e.position,'الراتب الشهري':Number(e.salary||0),'الراتب السنوي':Number(e.salary||0)*12,'الحالة':e.status||''}))],
    ['الحسابات والذمم',getAll('receivables').map(r=>({'الموزع':getAll('distributors').find(d=>d.id===r.distributorId)?.name||r.distributorName||'','رقم الفاتورة':r.invoiceNumber||'','المبلغ':Number(r.amount||0),'تاريخ الاستحقاق':r.dueDate||'','الحالة':r.status||''}))],
    ['المشتريات',getAll('purchaseOrders').map(o=>({'رقم الطلب':o.poNumber||'','المادة':o.materialName||'','المورد':o.supplier||'','الكمية':Number(o.quantity||0),'الإجمالي':Number(o.totalAmount||0),'الحالة':o.status||''}))],
    ['ضبط الجودة',getAll('qualityChecks').map(r=>({'المنتج':getAll('products').find(p=>p.id===r.productId)?.name||'','رقم الدفعة':r.batchNumber||'','تاريخ الفحص':r.checkDate||'','الكيميائي':r.analyst||'','النتيجة':r.result||''}))],
    ['المرتجعات',getAll('returns').map(r=>({'الموزع':getAll('distributors').find(d=>d.id===r.distributorId)?.name||'','المنتج':getAll('products').find(p=>p.id===r.productId)?.name||'','الكمية':Number(r.quantity||0),'السبب':r.reason||'','الإجراء':r.action||'','التاريخ':r.returnDate||''}))],
    ['العقود',getAll('contracts').map(c=>({'الطرف الثاني':c.partyName,'نوع العقد':c.contractType||'','تاريخ البداية':c.startDate||'','تاريخ الانتهاء':c.endDate||'','القيمة':Number(c.value||0)}))],
  ];
  const dels=getAll('deliveryOrders'),exps=getAll('expenses'),pos=getAll('productionOrders'),inv=getAll('inventory');
  const rev=dels.filter(d=>d.status==='delivered').reduce((s,d)=>s+Number(d.totalAmount||0),0);
  const dc=exps.filter(e=>e.expenseType==='direct').reduce((s,e)=>s+Number(e.amount||0),0);
  const ic=exps.filter(e=>e.expenseType==='indirect').reduce((s,e)=>s+Number(e.amount||0),0);
  const pc=pos.reduce((s,p)=>s+Number(p.totalCost||0),0);
  const np=rev-dc-ic-pc,iv=inv.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.unitCost||0),0);
  sheets.push(['التقرير المالي',[
    {'البيان':'إجمالي الإيرادات','القيمة (ج.م)':rev},
    {'البيان':'تكاليف الإنتاج CMO','القيمة (ج.م)':pc},
    {'البيان':'تكاليف مباشرة','القيمة (ج.م)':dc},
    {'البيان':'تكاليف غير مباشرة','القيمة (ج.م)':ic},
    {'البيان':'صافي الربح / الخسارة','القيمة (ج.م)':np},
    {'البيان':'قيمة المخزون','القيمة (ج.م)':iv},
    {'البيان':'هامش الربح %','القيمة (ج.م)':rev>0?((np/rev)*100).toFixed(2)+'%':'0%'},
  ]]);
  sheets.forEach(([name,data])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name));
  XLSX.writeFile(wb,`ERP-Report-${new Date().toISOString().slice(0,10)}.xlsx`);
}

      items.filter(i=>i.expiryDate).map(i=>{
        const s=i.daysLeft<0?'منتهي':i.daysLeft<=90?'خطر':i.daysLeft<=180?'تنبيه':'آمن';
        const c=i.daysLeft<0?'text-red':i.daysLeft<=90?'text-amber':i.daysLeft<=180?'text-blue':'text-green';

        return tr(

          `<span class="${actual>=target?'text-green':'text-red'} fw7">${fmt(actual-target)} ج.م</span>`,

  const expenses=getAll('expenses');
  setPage('تحليل تكلفة المنتج','تحليل cost per unit لكل منتج','',
    `<div class="card">${tbl(['المنتج','تكلفة المواد/وحدة','تكلفة الإنتاج CMO/وحدة','إجمالي التكلفة/وحدة','سعر البيع','هامش الربح','هامش %'],
      products.map(p=>{
        const matCost=bom.filter(b=>b.productId===p.id).reduce((s,b)=>{
          const mat=getAll('materials').find(m=>m.id===b.materialId);
          return s+Number(b.quantityPerUnit||0)*Number(mat?.unitCost||0);
        },0);
        const prodOrds=production.filter(o=>o.productId===p.id);
        const cmoCost=prodOrds.length?prodOrds.reduce((s,o)=>s+Number(o.unitCost||0),0)/prodOrds.length:0;
        const total=matCost+cmoCost;
        const price=Number(p.sellingPrice||0);
        const margin=price-total;
        const pct=price>0?(margin/price*100):0;
        return tr(`<strong>${p.name}</strong>`,
          matCost?fmt(matCost)+' ج.م':'—',
          cmoCost?fmt(cmoCost)+' ج.م':'—',
          `<span class="text-red fw7">${fmt(total)} ج.م</span>`,
          price?`<span class="text-blue fw7">${fmt(price)} ج.م</span>`:'—',
          margin?`<span class="${margin>=0?'text-green':'text-red'} fw7">${fmt(margin)} ج.م</span>`:'—',
          `<span class="${pct>=30?'text-green':pct>=10?'text-amber':'text-red'} fw7">${pct.toFixed(1)}%</span>`);
      })
    )}</div>`);
};
